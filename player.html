<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ClipGo Video Player</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
}

.container{
position:relative;
height:100vh;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.actions{
position:absolute;
right:20px;
bottom:120px;
display:flex;
flex-direction:column;
gap:20px;
}

.actions button{
background:none;
border:none;
color:white;
font-size:24px;
cursor:pointer;
}

.info{
position:absolute;
left:20px;
bottom:40px;
}

.comments{
position:absolute;
bottom:0;
width:100%;
background:#111;
padding:15px;
}

.comments input{
width:80%;
padding:8px;
border:none;
border-radius:5px;
background:#222;
color:white;
}

.comments button{
padding:8px 15px;
border:none;
border-radius:5px;
background:#4da3ff;
color:white;
cursor:pointer;
}

.topbar{
position:absolute;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:15px;
}

.back{
background:#222;
border:none;
color:white;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<div class="topbar">

<button class="back" onclick="goBack()">Back</button>

<div>ClipGo</div>

</div>

<video id="videoPlayer" controls autoplay>

<source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">

</video>

<div class="actions">

<button onclick="like()">❤️</button>

<button onclick="toggleComments()">💬</button>

<button onclick="share()">📤</button>

</div>

<div class="info">

<h3>@creator_name</h3>

<p>Sample video caption goes here</p>

</div>

<div class="comments" id="commentBox" style="display:none;">

<input type="text" id="commentText" placeholder="Write comment">

<button onclick="postComment()">Post</button>

</div>

</div>

<script>

function like(){

alert("Video Liked")

}

function share(){

alert("Share feature coming soon")

}

function goBack(){

window.history.back()

}

function toggleComments(){

let box=document.getElementById("commentBox")

if(box.style.display==="none"){

box.style.display="block"

}else{

box.style.display="none"

}

}

function postComment(){

let text=document.getElementById("commentText").value

if(text){

alert("Comment Posted")

document.getElementById("commentText").value=""

}

}

</script>

</body>
</html>
