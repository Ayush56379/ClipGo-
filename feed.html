<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ClipGo Feed</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
overflow:hidden;
}

/* TOP BAR */

.topbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:10px 20px;
z-index:100;
}

.logo{
font-size:22px;
font-weight:bold;
}

/* FEED */

.feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.video-card{
height:100vh;
position:relative;
scroll-snap-align:start;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

/* ACTION BUTTONS */

.actions{
position:absolute;
right:15px;
bottom:120px;
display:flex;
flex-direction:column;
gap:18px;
}

.actions button{
background:none;
border:none;
color:white;
font-size:24px;
cursor:pointer;
}

/* USER INFO */

.user{
position:absolute;
left:15px;
bottom:60px;
}

.caption{
font-size:14px;
color:#ddd;
}

</style>

</head>

<body>

<div class="topbar">

<div class="logo">ClipGo</div>

</div>

<div class="feed" id="feed"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbxtBZHtXbXOUyNgp9Svb2uVnlF4sXzLXtRGCSYmEHXTrFQa1IQwFPSfWtfGJfsopnV7/exec"

/* LOAD VIDEOS */

async function loadVideos(){

let res=await fetch(API+"?action=getVideos")

let data=await res.json()

let feed=document.getElementById("feed")

data.videos.forEach(v=>{

let card=document.createElement("div")
card.className="video-card"

card.innerHTML=`

<video src="${v.url}" autoplay muted loop></video>

<div class="actions">

<button onclick="like()">❤️</button>

<button onclick="comment()">💬</button>

<button onclick="share()">📤</button>

</div>

<div class="user">

<strong>@creator</strong>

<div class="caption">${v.name}</div>

</div>

`

feed.appendChild(card)

})

}

function like(){

alert("Liked")

}

function comment(){

let c=prompt("Write comment")

if(c){
alert("Comment posted")
}

}

function share(){

alert("Share coming soon")

}

loadVideos()

</script>

</body>
</html>
