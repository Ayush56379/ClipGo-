<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ClipGo Feed</title>

<style>

body{
margin:0;
background:black;
color:white;
font-family:Arial;
overflow:hidden;
}

.feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.video-card{
height:100vh;
position:relative;
scroll-snap-align:start;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.actions{
position:absolute;
right:15px;
bottom:100px;
display:flex;
flex-direction:column;
gap:20px;
}

.actions button{
background:none;
border:none;
color:white;
font-size:22px;
cursor:pointer;
}

.user{
position:absolute;
left:15px;
bottom:40px;
}

.topbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:10px 20px;
z-index:10;
}

.logout{
background:#ff4444;
border:none;
color:white;
padding:6px 12px;
border-radius:6px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="topbar">

<div>ClipGo</div>

<button class="logout" onclick="logout()">Logout</button>

</div>

<div class="feed" id="feed">

<div class="video-card">

<video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay muted loop></video>

<div class="actions">

<button onclick="like()">❤️</button>
<button onclick="comment()">💬</button>
<button onclick="share()">📤</button>

</div>

<div class="user">@creator1</div>

</div>


<div class="video-card">

<video src="https://www.w3schools.com/html/movie.mp4" autoplay muted loop></video>

<div class="actions">

<button onclick="like()">❤️</button>
<button onclick="comment()">💬</button>
<button onclick="share()">📤</button>

</div>

<div class="user">@creator2</div>

</div>


<div class="video-card">

<video src="https://www.w3schools.com/html/mov_bbb.mp4" autoplay muted loop></video>

<div class="actions">

<button onclick="like()">❤️</button>
<button onclick="comment()">💬</button>
<button onclick="share()">📤</button>

</div>

<div class="user">@creator3</div>

</div>

</div>

<script>

function like(){

alert("Video Liked")

}

function comment(){

let text=prompt("Write comment")

if(text){
alert("Comment Posted")
}

}

function share(){

alert("Share feature coming soon")

}

function logout(){

localStorage.removeItem("clipgoUser")

window.location="login.html"

}

</script>

</body>
</html>
