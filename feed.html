<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ClipGo Feed</title>

<style>

body{
margin:0;
background:black;
font-family:Arial;
color:white;
overflow:hidden;
}

.header{
position:fixed;
top:0;
width:100%;
padding:15px;
font-size:22px;
font-weight:bold;
background:rgba(0,0,0,0.7);
z-index:10;
}

.feed{
height:100vh;
overflow-y:scroll;
scroll-snap-type:y mandatory;
}

.video-card{
height:100vh;
scroll-snap-align:start;
position:relative;
}

video{
width:100%;
height:100%;
object-fit:cover;
}

.actions{
position:absolute;
right:15px;
bottom:120px;
display:flex;
flex-direction:column;
gap:15px;
}

.actions button{
background:none;
border:none;
color:white;
font-size:25px;
}

.user{
position:absolute;
bottom:60px;
left:15px;
}

</style>

</head>

<body>

<div class="header">ClipGo</div>

<div class="feed" id="feed"></div>

<script>

const API="https://script.google.com/macros/s/AKfycbxtBZHtXbXOUyNgp9Svb2uVnlF4sXzLXtRGCSYmEHXTrFQa1IQwFPSfWtfGJfsopnV7/exec"

async function loadVideos(){

try{

let res=await fetch(API+"?action=getVideos")

let data=await res.json()

let feed=document.getElementById("feed")

if(!data.videos || data.videos.length===0){

feed.innerHTML="<h2 style='text-align:center;margin-top:100px;'>No videos yet</h2>"

return

}

data.videos.forEach(v=>{

let card=document.createElement("div")

card.className="video-card"

card.innerHTML=`

<video src="${v.url}" autoplay muted loop playsinline></video>

<div class="actions">

<button onclick="like()">❤️</button>

<button onclick="comment()">💬</button>

</div>

<div class="user">

<strong>@creator</strong>
<div>${v.name}</div>

</div>

`

feed.appendChild(card)

})

}catch(e){

document.getElementById("feed").innerHTML="<h2 style='text-align:center;margin-top:100px;'>Video load error</h2>"

}

}

function like(){

alert("Liked")

}

function comment(){

let c=prompt("Write comment")

if(c){
alert("Comment posted")
}

}

loadVideos()

</script>

</body>
</html>
