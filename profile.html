<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Creator Profile - ClipGo</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

.header{
text-align:center;
padding:30px 20px;
background:#111;
}

.avatar{
width:100px;
height:100px;
border-radius:50%;
background:#333;
margin:auto;
}

.username{
font-size:22px;
margin-top:10px;
}

.stats{
display:flex;
justify-content:center;
gap:40px;
margin-top:15px;
}

.stat{
text-align:center;
}

.follow-btn{
margin-top:15px;
padding:10px 20px;
background:#4da3ff;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.container{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.video-card{
background:#1b1b1b;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.video-card video{
width:100%;
height:200px;
object-fit:cover;
}

</style>

</head>

<body>

<div class="header">

<div class="avatar"></div>

<div class="username">@creator_name</div>

<div class="stats">

<div class="stat">
<strong>12</strong>
<div>Videos</div>
</div>

<div class="stat">
<strong>500</strong>
<div>Followers</div>
</div>

<div class="stat">
<strong>120</strong>
<div>Following</div>
</div>

</div>

<button class="follow-btn" onclick="followUser()">Follow</button>

</div>

<div class="container">

<h2>Videos</h2>

<div class="grid">

<div class="video-card">
<video src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
</div>

<div class="video-card">
<video src="https://www.w3schools.com/html/movie.mp4"></video>
</div>

<div class="video-card">
<video src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
</div>

<div class="video-card">
<video src="https://www.w3schools.com/html/movie.mp4"></video>
</div>

</div>

</div>

<script>

function followUser(){

alert("You followed this creator")

}

</script>

</body>
</html>
