<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Explore - ClipGo</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#111;
}

.logo{
font-size:22px;
color:#4da3ff;
font-weight:bold;
}

.search-box{
padding:10px;
width:60%;
border:none;
border-radius:6px;
background:#2a2a2a;
color:white;
}

.container{
padding:20px;
}

h2{
margin-bottom:15px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
}

.card{
background:#1b1b1b;
border-radius:10px;
overflow:hidden;
cursor:pointer;
}

.card video{
width:100%;
height:180px;
object-fit:cover;
}

.creator{
padding:8px;
font-size:14px;
}

</style>

</head>

<body>

<header>

<div class="logo">ClipGo</div>

<input type="text" class="search-box" placeholder="Search videos or creators" onkeyup="searchContent(this.value)">

</header>

<div class="container">

<h2>Trending Videos</h2>

<div class="grid" id="videoGrid">

<div class="card">
<video src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
<div class="creator">@creator1</div>
</div>

<div class="card">
<video src="https://www.w3schools.com/html/movie.mp4"></video>
<div class="creator">@creator2</div>
</div>

<div class="card">
<video src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
<div class="creator">@creator3</div>
</div>

<div class="card">
<video src="https://www.w3schools.com/html/movie.mp4"></video>
<div class="creator">@creator4</div>
</div>

</div>

</div>

<script>

function searchContent(query){

query=query.toLowerCase()

let cards=document.querySelectorAll(".card")

cards.forEach(card=>{

let creator=card.innerText.toLowerCase()

if(creator.includes(query)){

card.style.display="block"

}else{

card.style.display="none"

}

})

}

</script>

</body>
</html>
