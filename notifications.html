<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Notifications - ClipGo</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#111;
}

.logo{
font-size:22px;
font-weight:bold;
color:#4da3ff;
}

.container{
padding:20px;
}

.notification{
background:#1b1b1b;
padding:15px;
border-radius:8px;
margin-bottom:10px;
display:flex;
align-items:center;
gap:10px;
}

.icon{
font-size:20px;
}

.text{
flex:1;
}

.time{
font-size:12px;
color:#aaa;
}

</style>

</head>

<body>

<header>

<div class="logo">ClipGo</div>

<div>Notifications</div>

</header>

<div class="container">

<div class="notification">

<div class="icon">❤️</div>

<div class="text">
<strong>@creator1</strong> liked your video
<div class="time">2 minutes ago</div>
</div>

</div>


<div class="notification">

<div class="icon">👤</div>

<div class="text">
<strong>@user23</strong> started following you
<div class="time">10 minutes ago</div>
</div>

</div>


<div class="notification">

<div class="icon">💬</div>

<div class="text">
<strong>@creator2</strong> commented on your video
<div class="time">30 minutes ago</div>
</div>

</div>


<div class="notification">

<div class="icon">🔥</div>

<div class="text">
Your video is trending
<div class="time">1 hour ago</div>
</div>

</div>

</div>

</body>
</html>
