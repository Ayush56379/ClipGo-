<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Followers - ClipGo</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:#111;
padding:15px;
text-align:center;
font-size:22px;
color:#4da3ff;
}

.tabs{
display:flex;
}

.tab{
flex:1;
text-align:center;
padding:12px;
cursor:pointer;
background:#1b1b1b;
}

.tab.active{
background:#4da3ff;
}

.container{
padding:20px;
}

.user{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
background:#1b1b1b;
margin-bottom:10px;
border-radius:8px;
}

.follow-btn{
background:#4da3ff;
border:none;
padding:6px 12px;
border-radius:5px;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<header>ClipGo</header>

<div class="tabs">

<div class="tab active" onclick="showFollowers()">Followers</div>

<div class="tab" onclick="showFollowing()">Following</div>

</div>

<div class="container" id="list">

<div class="user">
<span>@creator1</span>
<button class="follow-btn">Follow Back</button>
</div>

<div class="user">
<span>@user45</span>
<button class="follow-btn">Follow Back</button>
</div>

<div class="user">
<span>@creator9</span>
<button class="follow-btn">Follow Back</button>
</div>

</div>

<script>

function showFollowers(){

document.querySelectorAll(".tab")[0].classList.add("active")
document.querySelectorAll(".tab")[1].classList.remove("active")

document.getElementById("list").innerHTML=`

<div class="user">
<span>@creator1</span>
<button class="follow-btn">Follow Back</button>
</div>

<div class="user">
<span>@user45</span>
<button class="follow-btn">Follow Back</button>
</div>

<div class="user">
<span>@creator9</span>
<button class="follow-btn">Follow Back</button>
</div>

`

}

function showFollowing(){

document.querySelectorAll(".tab")[1].classList.add("active")
document.querySelectorAll(".tab")[0].classList.remove("active")

document.getElementById("list").innerHTML=`

<div class="user">
<span>@creator2</span>
<button class="follow-btn">Unfollow</button>
</div>

<div class="user">
<span>@creator5</span>
<button class="follow-btn">Unfollow</button>
</div>

`

}

</script>

</body>
</html>
