<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Settings - ClipGo</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0f0f0f;
color:white;
}

header{
background:#111;
padding:15px;
text-align:center;
font-size:22px;
color:#4da3ff;
}

.container{
padding:20px;
max-width:400px;
margin:auto;
}

.section{
background:#1b1b1b;
padding:15px;
border-radius:8px;
margin-bottom:15px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border:none;
border-radius:5px;
background:#222;
color:white;
}

button{
margin-top:10px;
padding:10px 15px;
border:none;
border-radius:6px;
background:#4da3ff;
color:white;
cursor:pointer;
}

.logout{
background:#ff4444;
width:100%;
}

.toggle{
display:flex;
justify-content:space-between;
align-items:center;
}

</style>

</head>

<body>

<header>ClipGo Settings</header>

<div class="container">

<div class="section">

<h3>Edit Profile</h3>

<input type="text" placeholder="Username">

<input type="text" placeholder="Bio">

<button onclick="saveProfile()">Save</button>

</div>

<div class="section">

<h3>Change Password</h3>

<input type="password" placeholder="New Password">

<button onclick="changePassword()">Update Password</button>

</div>

<div class="section toggle">

<span>Dark Mode</span>

<input type="checkbox" onclick="toggleMode()">

</div>

<div class="section">

<button class="logout" onclick="logout()">Logout</button>

</div>

</div>

<script>

function saveProfile(){

alert("Profile updated")

}

function changePassword(){

alert("Password changed")

}

function toggleMode(){

document.body.classList.toggle("light")

if(document.body.classList.contains("light")){

document.body.style.background="#f5f5f5"
document.body.style.color="black"

}else{

document.body.style.background="#0f0f0f"
document.body.style.color="white"

}

}

function logout(){

localStorage.removeItem("clipgoUser")

window.location="login.html"

}

</script>

</body>
</html>
